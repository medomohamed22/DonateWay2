<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pi Subscription</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #6a11cb, #2575fc);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: white;
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  width: 320px;
}

button {
  background: #6a11cb;
  color: white;
  border: none;
  padding: 15px;
  border-radius: 10px;
  width: 100%;
  font-size: 18px;
}

.status {
  margin-top: 15px;
}
</style>
</head>

<body>

<div class="card">
  <h2>Premium Plan</h2>
  <p>1 π / month</p>
  <button onclick="subscribe()">Subscribe</button>
  <div class="status" id="status"></div>
</div>

<script>
const Pi = window.Pi;

Pi.init({
  version: "2.0",
  sandbox: false
});

async function subscribe() {

  const user = await Pi.authenticate(['username', 'payments']);

  const paymentData = {
    amount: 1,
    memo: "Subscription",
    metadata: { plan: "premium" }
  };

  function onReadyForServerApproval(paymentId) {

    document.getElementById("status").innerText = "Approving...";

    fetch("http://localhost:3000/approve", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ paymentId })
    });
  }

  function onReadyForServerCompletion(paymentId) {

    document.getElementById("status").innerText = "Completing...";

    fetch("http://localhost:3000/complete", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ paymentId })
    })
    .then(() => {
      document.getElementById("status").innerText = "Success ✅";
    });
  }

  function onCancel() {
    document.getElementById("status").innerText = "Cancelled ❌";
  }

  function onError(err) {
    console.error(err);
    document.getElementById("status").innerText = "Error ❗";
  }

  Pi.createPayment(
    paymentData,
    onReadyForServerApproval,
    onReadyForServerCompletion,
    onCancel,
    onError
  );
}
</script>

</body>
</html>
