<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pi Subscription</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #6a11cb, #2575fc);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: white;
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  width: 300px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

h1 {
  color: #6a11cb;
}

.price {
  font-size: 28px;
  margin: 20px 0;
  color: #333;
}

button {
  background: #6a11cb;
  color: white;
  border: none;
  padding: 15px;
  border-radius: 10px;
  width: 100%;
  font-size: 18px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #4e0fa3;
}

.status {
  margin-top: 15px;
  color: green;
}
</style>
</head>

<body>

<div class="card">
  <h1>Premium Plan</h1>
  <div class="price">1 π / month</div>
  <button onclick="subscribe()">Subscribe Now</button>
  <div class="status" id="status"></div>
</div>

<script>
const Pi = window.Pi;

// Initialize Pi SDK
Pi.init({
  version: "2.0",
  sandbox: false // مهم جدا عشان testnet
});

// طلب الدفع (اشتراك)
function subscribe() {

  const paymentData = {
    amount: 1,
    memo: "Monthly Subscription",
    metadata: { plan: "premium" }
  };

  function onReadyForServerApproval(paymentId) {
    console.log("Ready:", paymentId);

    // هنا المفروض تبعت paymentId للـ backend
    // عشان تأكد العملية (لكن احنا هنعمل simulation)
    setTimeout(() => {
      onReadyForServerCompletion(paymentId);
    }, 2000);
  }

  function onReadyForServerCompletion(paymentId) {
    console.log("Completed:", paymentId);
    document.getElementById("status").innerText = "Payment Successful ✅";
  }

  function onCancel(paymentId) {
    document.getElementById("status").innerText = "Payment Cancelled ❌";
  }

  function onError(error, payment) {
    console.error(error);
    document.getElementById("status").innerText = "Error ❗";
  }

  Pi.createPayment(
    paymentData,
    onReadyForServerApproval,
    onReadyForServerCompletion,
    onCancel,
    onError
  );
}
</script>

</body>
</html>
