<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pi Subscription</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #6a11cb, #2575fc);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: white;
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  width: 320px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

h1 {
  color: #6a11cb;
}

.price {
  font-size: 28px;
  margin: 20px 0;
  color: #333;
}

button {
  background: #6a11cb;
  color: white;
  border: none;
  padding: 15px;
  border-radius: 10px;
  width: 100%;
  font-size: 18px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #4e0fa3;
}

.status {
  margin-top: 15px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="card">
  <h1>Premium Plan</h1>
  <div class="price">1 π / month</div>
  <button onclick="subscribe()">Subscribe Now</button>
  <div class="status" id="status"></div>
</div>

<script>
const Pi = window.Pi;

Pi.init({
  version: "2.0",
  sandbox: false
});

// تسجيل دخول المستخدم
async function authUser() {
  try {
    const scopes = ['username', 'payments'];
    const user = await Pi.authenticate(scopes, function(payment) {
      console.log("Incomplete payment found:", payment);
    });
    console.log("User:", user);
    return user;
  } catch (err) {
    console.error(err);
    document.getElementById("status").innerText = "Login failed ❌";
  }
}

// زر الاشتراك
async function subscribe() {

  document.getElementById("status").innerText = "Processing...";

  const user = await authUser();
  if (!user) return;

  const paymentData = {
    amount: 1,
    memo: "Monthly Subscription",
    metadata: { plan: "premium" }
  };

  function onReadyForServerApproval(paymentId) {
    console.log("Approve:", paymentId);

    // ⚠️ هنا لازم backend حقيقي
    document.getElementById("status").innerText = "Waiting for approval...";
  }

  function onReadyForServerCompletion(paymentId) {
    console.log("Complete:", paymentId);
    document.getElementById("status").innerText = "Payment Successful ✅";
  }

  function onCancel(paymentId) {
    document.getElementById("status").innerText = "Cancelled ❌";
  }

  function onError(error) {
    console.error(error);
    document.getElementById("status").innerText = "Error ❗";
  }

  Pi.createPayment(
    paymentData,
    onReadyForServerApproval,
    onReadyForServerCompletion,
    onCancel,
    onError
  );
}
</script>

</body>
</html>
